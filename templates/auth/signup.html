{% extends 'base.html' %}
{% block title %}Sign Up - AICTE Points{% endblock %}

{% block content %}
<div class="auth-container signup-container">
    <div class="auth-card auth-card-large">
        <div class="auth-header">
            <h2>Create an Account</h2>
            <p>Join the AICTE Points System</p>
        </div>
        
        <div class="role-selector">
            <button type="button" class="role-btn active" data-role="student">Student</button>
            <button type="button" class="role-btn" data-role="club">Club</button>
        </div>
        
        <form method="POST" action="{{ url_for('auth.signup') }}" class="auth-form" id="signupForm">
            <input type="hidden" name="role" id="roleInput" value="{{ data.get('role', 'student') }}">
            
            <div class="form-grid">
                <!-- Common Fields -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" value="{{ data.get('username', '') }}" required>
                    <small class="form-text">Used for login. 3-80 characters.</small>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" value="{{ data.get('email', '') }}" required>
                </div>
                
                <div class="form-group full-width">
                    <label for="full_name" id="label_full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control" value="{{ data.get('full_name', '') }}" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-group">
                        <input type="password" id="password" name="password" class="form-control" required minlength="6">
                        <button type="button" class="password-toggle" tabindex="-1"><i data-lucide="eye" style="width:16px;height:16px"></i></button>
                    </div>
                    <small class="form-text">Minimum 6 characters.</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="password-input-group">
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6">
                        <button type="button" class="password-toggle" tabindex="-1"><i data-lucide="eye" style="width:16px;height:16px"></i></button>
                    </div>
                </div>
                
                <!-- Student Specific Fields -->
                <div class="student-fields section-transition active">
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" class="form-control">
                            <option value="">Select Department...</option>
                            <option value="Computer Science" {% if data.get('department') == 'Computer Science' %}selected{% endif %}>Computer Science</option>
                            <option value="Information Technology" {% if data.get('department') == 'Information Technology' %}selected{% endif %}>Information Technology</option>
                            <option value="Electronics" {% if data.get('department') == 'Electronics' %}selected{% endif %}>Electronics & Communication</option>
                            <option value="Mechanical" {% if data.get('department') == 'Mechanical' %}selected{% endif %}>Mechanical Engineering</option>
                            <option value="Civil" {% if data.get('department') == 'Civil' %}selected{% endif %}>Civil Engineering</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="roll_number">Roll Number</label>
                        <input type="text" id="roll_number" name="roll_number" class="form-control" value="{{ data.get('roll_number', '') }}">
                    </div>
                </div>
                
                <!-- Club Specific Fields -->
                <div class="club-fields section-transition" style="display: none;">
                    <div class="form-group">
                        <label for="club_name">Club/Organization Name</label>
                        <input type="text" id="club_name" name="club_name" class="form-control" value="{{ data.get('club_name', '') }}">
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="club_description">Club Description</label>
                        <textarea id="club_description" name="club_description" class="form-control" rows="3">{{ data.get('club_description', '') }}</textarea>
                    </div>
                </div>
            </div>
            
            <div class="form-actions" style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </div>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
